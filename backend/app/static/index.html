<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>引用最终落点</title>
  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #172033;
      background: #f7fafc;
      --fact: #1f9d55;
      --opinion: #e58a1f;
      --unresolved: #94a3b8;
      --mismatch: #c2410c;
    }
    body { margin: 0; }
    main { max-width: 1180px; margin: 0 auto; padding: 32px 20px 64px; }
    h1 { font-size: 32px; margin: 0 0 8px; }
    h2 { margin: 28px 0 12px; }
    textarea, input, select {
      width: 100%; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 10px;
      padding: 12px; font: inherit; background: white;
    }
    textarea { min-height: 220px; resize: vertical; }
    button {
      border: 0; border-radius: 999px; padding: 12px 18px; font-weight: 800; cursor: pointer;
      background: #101827; color: white;
    }
    button.secondary { background: #e2e8f0; color: #111827; }
    button.danger { background: #b91c1c; color: white; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-top: 12px; }
    .checkline { display: flex; gap: 8px; align-items: center; margin-top: 12px; }
    .checkline input { width: auto; }
    .muted { color: #64748b; }
    .small { font-size: 13px; }
    .card {
      background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px;
      box-shadow: 0 1px 2px rgba(15,23,42,.04);
    }
    .error { color: #b91c1c; font-weight: 800; }
    .result-grid { display: grid; grid-template-columns: minmax(280px, 420px) 1fr; gap: 16px; align-items: stretch; }
    .summary-line { font-size: 18px; line-height: 1.5; margin: 0; }
    .pie-wrap { display: grid; grid-template-columns: 180px 1fr; gap: 18px; align-items: center; }
    .pie {
      width: 180px; height: 180px; border-radius: 50%;
      background: conic-gradient(var(--fact) 0 0, var(--opinion) 0 0, var(--unresolved) 0 100%);
      box-shadow: inset 0 0 0 1px rgba(15,23,42,.08);
    }
    .legend { display: grid; gap: 10px; }
    .legend-row { display: flex; justify-content: space-between; gap: 12px; align-items: center; }
    .legend-label { display: inline-flex; gap: 8px; align-items: center; }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .fact { background: var(--fact); }
    .opinion { background: var(--opinion); }
    .unresolved { background: var(--unresolved); }
    .mismatch { background: var(--mismatch); }
    .warning-badge {
      display: inline-flex; align-items: center; gap: 8px; border-radius: 999px; padding: 8px 12px;
      background: #fff7ed; color: #9a3412; border: 1px solid #fed7aa; font-weight: 800;
    }
    .reason-breakdown { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .reason-chip { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; border-radius: 999px; padding: 5px 9px; font-size: 12px; }
    .graph-help { margin: 0 0 12px; }
    .terminal-graph { overflow-x: auto; border: 1px solid #e2e8f0; border-radius: 12px; background: #f8fafc; padding: 14px; }
    .graph-columns { display: grid; grid-template-columns: 180px 210px 250px 210px; gap: 14px; min-width: 900px; }
    .graph-col { display: flex; flex-direction: column; gap: 10px; }
    .graph-title { color: #64748b; font-size: 12px; font-weight: 900; letter-spacing: .04em; }
    .graph-node {
      width: 100%; text-align: left; color: #172033; background: white; border: 1px solid #cbd5e1;
      border-radius: 10px; padding: 10px; cursor: pointer; font-weight: 700;
    }
    .graph-node span { display: block; color: #64748b; font-size: 12px; font-weight: 500; margin-top: 4px; }
    .graph-node.terminal_fact { border-color: #86efac; }
    .graph-node.terminal_opinion { border-color: #fdba74; }
    .graph-node.terminal_unresolved { border-color: #cbd5e1; }
    .graph-node.terminal_mismatch { border-color: #fca5a5; }
    .edge-list { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .edge-chip { background: white; border: 1px solid #e2e8f0; border-radius: 999px; padding: 5px 9px; font-size: 12px; color: #475569; }
    .node-detail { margin-top: 12px; border-top: 1px solid #e2e8f0; padding-top: 12px; }
    .citation-list { margin: 8px 0 0; padding-left: 18px; }
    .citation-list li { margin: 6px 0; }
    details { margin-top: 16px; }
    summary { cursor: pointer; font-weight: 900; }
    .terminal-list { display: grid; gap: 10px; margin-top: 12px; }
    .terminal-item { border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px; background: white; }
    .terminal-item strong { display: inline-block; margin-bottom: 4px; }
    .debug-grid { display: grid; grid-template-columns: minmax(130px, 220px) 1fr; gap: 8px 12px; margin-top: 12px; font-size: 13px; }
    .debug-grid dt { font-weight: 900; color: #475569; }
    .debug-grid dd { margin: 0; word-break: break-word; }
    @media (max-width: 760px) {
      .result-grid, .pie-wrap { grid-template-columns: 1fr; }
      .pie { width: 160px; height: 160px; }
    }
  </style>
</head>
<body>
  <main>
    <h1>引用最终落点</h1>
    <p class="muted">本结果只分析已标注 citation 的内容，不判断观点对错，只判断 citation 最终是否能追溯到事实来源。</p>

    <section class="card">
      <label for="question"><strong>原始问题，可选</strong></label>
      <input id="question" placeholder="例如：这段 AI 回答的引用最终落到哪里？" />
      <div style="height:12px"></div>
      <label for="extractor"><strong>主张抽取器</strong></label>
      <select id="extractor">
        <option value="codex" selected>Codex CLI / 快速结构化模式</option>
        <option value="openai">OpenAI API 抽取</option>
        <option value="auto">自动：OpenAI API 或 Codex</option>
      </select>
      <label class="checkline">
        <input type="checkbox" id="webSearch" checked />
        <span>自动搜索缺失 URL 的来源说明</span>
      </label>
      <div style="height:12px"></div>
      <label for="text"><strong>输入文本</strong></label>
      <textarea id="text" placeholder="粘贴 AI 回答、网络文章正文或带引用标记的文本"></textarea>
      <div class="row">
        <button id="analyzeBtn">分析引用落点</button>
        <button class="danger" id="cancelBtn" style="display:none">取消</button>
        <button class="secondary" id="sampleBtn">加载示例</button>
        <span class="muted small">默认抓取显式 URL，并会搜索缺失 URL 的来源说明。仍可在 API 请求里传预置来源正文做精确测试。</span>
      </div>
      <p id="status" class="muted"></p>
    </section>

    <section id="results" style="display:none">
      <h2>结论</h2>
      <div class="result-grid">
        <section class="card">
          <p id="terminalSummaryLine" class="summary-line"></p>
          <div style="height:14px"></div>
          <span id="mismatchBadge" class="warning-badge"></span>
          <div id="unresolvedBreakdown" class="reason-breakdown"></div>
        </section>
        <section class="card">
          <div class="pie-wrap">
            <div id="terminalPie" class="pie" aria-label="引用最终落点饼图"></div>
            <div id="terminalLegend" class="legend"></div>
          </div>
        </section>
      </div>

      <h2>聚合证据树</h2>
      <p class="muted graph-help">绿色代表最终落到事实来源。橙色代表最终停在观点或分析来源。灰色代表本轮无法审计。红色只表示引用与陈述不对应，不代表观点一定错误。</p>
      <div class="terminal-graph">
        <div id="documentGraph" class="graph-columns"></div>
        <div id="documentEdges" class="edge-list"></div>
        <div id="nodeDetail" class="node-detail muted">点击来源或终点节点查看具体引用。</div>
      </div>

      <details>
        <summary>查看具体引用</summary>
        <div id="terminalResultList" class="terminal-list"></div>
      </details>

      <details>
        <summary>高级调试信息</summary>
        <dl id="advancedDebug" class="debug-grid"></dl>
      </details>
    </section>
  </main>
<script>
const pct = (v) => `${Math.round((v || 0) * 100)}%`;
const escapeHtml = (s) => String(s || '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const API_BASE = window.location.protocol === 'file:' ? 'http://127.0.0.1:8000' : '';
let currentJobId = null;
let pollTimer = null;

const terminalLabels = {
  fact: '事实终点',
  opinion: '观点终点',
  unresolved: '无法审计',
  mismatch: '引用错配'
};
const terminalColors = {
  fact: 'var(--fact)',
  opinion: 'var(--opinion)',
  unresolved: 'var(--unresolved)'
};
const unresolvedReasonLabels = {
  no_source_url: '缺少 URL',
  source_fetch_failed: '抓取失败',
  source_body_missing: '来源正文为空',
  no_relevant_snippet: '没有召回证据片段',
  cited_span_parse_error: 'citation span 解析失败',
  terminal_mapping_missing: 'terminal mapping 缺口'
};

function progressText(job) {
  const progress = job.progress || {};
  const message = translateProgressMessage(progress.message || (job.status === 'cancelling' ? '正在取消...' : '正在分析...'));
  if (typeof progress.current === 'number' && typeof progress.total === 'number') {
    return `${message} (${progress.current}/${progress.total})`;
  }
  return message;
}
function translateProgressMessage(value) {
  if (!value) return '';
  const exact = {
    'Parsing citations and citation-only chunks.': '正在解析引用和带引用片段。',
    'Extracting cited atomic claims.': '正在抽取带引用的原子主张。',
    'Resolved cited sources.': '已解析引用来源。',
    'Classifying review categories.': '正在分类审计结果。',
    'Classified review categories.': '已完成审计分类。',
    'Building audit summary.': '正在生成审计摘要。',
    'Analysis completed.': '分析完成。',
    'Analysis was cancelled.': '分析已取消。',
    'Waiting to start.': '等待开始。'
  };
  if (exact[value]) return exact[value];
  return value
    .replace('Extracted ', '已抽取 ')
    .replace(' cited claims.', ' 条带引用主张。')
    .replace('Resolving sources for claim ', '正在解析第 ')
    .replace(' of ', ' / ')
    .replace('Resolving cited sources.', '正在解析引用来源。')
    .replace('Checking support for ', '正在检查 ')
    .replace(' claim-source pairs.', ' 组主张-来源关系。')
    .replace('Checked support for ', '已检查 ')
    .replace('Extracting cited atomic claims, citation unit ', '正在抽取带引用原子主张，引用片段 ')
    .replace('Extracting cited atomic claims, chunk ', '正在抽取带引用原子主张，片段 ');
}

function render(result) {
  document.getElementById('results').style.display = 'block';
  const summary = result.document_evidence_summary || {};
  const terminalResults = result.citation_terminal_results || [];
  renderSummary(summary, terminalResults);
  renderPie(summary);
  renderDocumentGraph(result.document_evidence_graph || { nodes: [], edges: [] });
  renderTerminalResultList(terminalResults);
  renderAdvancedDebug(result);
}

function renderSummary(summary, terminalResults = []) {
  const total = summary.total_cited_statements || 0;
  const fact = summary.fact_terminal_count || 0;
  const opinion = summary.opinion_terminal_count || 0;
  const unresolved = summary.unresolved_terminal_count || 0;
  const mismatch = summary.mismatch_count || 0;
  document.getElementById('terminalSummaryLine').textContent =
    `共分析 ${total} 条带引用陈述：${fact} 条最终落到事实来源，${opinion} 条停在观点或分析来源，${unresolved} 条本轮无法审计。`;
  const badge = document.getElementById('mismatchBadge');
  badge.textContent = `引用不对应 ${mismatch} 条`;
  badge.style.display = mismatch ? 'inline-flex' : 'none';
  renderUnresolvedBreakdown(terminalResults);
}

function renderUnresolvedBreakdown(terminalResults) {
  const counts = new Map();
  (terminalResults || []).forEach(item => {
    if (item.terminal_class !== 'unresolved') return;
    const reason = item.unresolved_reason || 'terminal_mapping_missing';
    counts.set(reason, (counts.get(reason) || 0) + 1);
  });
  const target = document.getElementById('unresolvedBreakdown');
  if (!counts.size) {
    target.innerHTML = '';
    return;
  }
  target.innerHTML = Array.from(counts.entries()).map(([reason, count]) =>
    `<span class="reason-chip">${escapeHtml(unresolvedReasonLabels[reason] || reason)} · ${count}</span>`
  ).join('');
}

function renderPie(summary) {
  const fact = summary.fact_terminal_count || 0;
  const opinion = summary.opinion_terminal_count || 0;
  const unresolved = summary.unresolved_terminal_count || 0;
  const denom = fact + opinion + unresolved;
  const factDeg = denom ? (fact / denom) * 360 : 0;
  const opinionDeg = denom ? (opinion / denom) * 360 : 0;
  const pie = document.getElementById('terminalPie');
  pie.style.background = denom
    ? `conic-gradient(var(--fact) 0 ${factDeg}deg, var(--opinion) ${factDeg}deg ${factDeg + opinionDeg}deg, var(--unresolved) ${factDeg + opinionDeg}deg 360deg)`
    : 'conic-gradient(var(--unresolved) 0 360deg)';
  document.getElementById('terminalLegend').innerHTML = [
    legendRow('fact', '事实终点', fact, summary.fact_terminal_ratio || 0),
    legendRow('opinion', '观点终点', opinion, summary.opinion_terminal_ratio || 0),
    legendRow('unresolved', '无法审计', unresolved, summary.unresolved_ratio || 0)
  ].join('');
}
function legendRow(kind, label, count, ratio) {
  return `<div class="legend-row"><span class="legend-label"><span class="dot ${kind}"></span>${escapeHtml(label)}</span><strong>${count} · ${pct(ratio)}</strong></div>`;
}

function renderDocumentGraph(graph) {
  const nodes = graph.nodes || [];
  const edges = graph.edges || [];
  const columns = [
    ['document', '文档'],
    ['citation_group', '引用分组'],
    ['source', '来源'],
    ['terminal', '最终落点']
  ];
  const nodesByColumn = new Map(columns.map(([key]) => [key, []]));
  nodes.forEach(node => {
    const key = node.type && node.type.startsWith('terminal_') ? 'terminal' : node.type;
    if (!nodesByColumn.has(key)) nodesByColumn.set(key, []);
    nodesByColumn.get(key).push(node);
  });
  document.getElementById('documentGraph').innerHTML = columns.map(([key, title]) => `
    <section class="graph-col">
      <div class="graph-title">${escapeHtml(title)}</div>
      ${(nodesByColumn.get(key) || []).map(renderGraphNode).join('') || '<div class="muted small">-</div>'}
    </section>
  `).join('');
  document.querySelectorAll('.graph-node').forEach((button) => {
    button.addEventListener('click', () => {
      const node = nodes.find((item) => item.id === button.dataset.nodeId);
      renderNodeDetail(node);
    });
  });
  document.getElementById('documentEdges').innerHTML = edges.map(edge =>
    `<span class="edge-chip">${escapeHtml(edgeLabel(edge))} · ${edge.count}</span>`
  ).join('');
}
function renderGraphNode(node) {
  const nodeClass = node.type || '';
  const count = Number.isFinite(node.count) ? node.count : 0;
  return `<button type="button" class="graph-node ${escapeHtml(nodeClass)}" data-node-id="${escapeHtml(node.id)}">
    ${escapeHtml(node.label)}<span>${count} 条引用</span>
  </button>`;
}
function edgeLabel(edge) {
  const map = {
    cites: '引用',
    points_to_source: '指向来源',
    source_cites_upstream: '上游来源',
    lands_on_fact: '落到事实',
    lands_on_opinion: '落到观点',
    unresolved: '无法审计',
    mismatch: '引用错配'
  };
  return edge.label || map[edge.type] || edge.type || '';
}
function renderNodeDetail(node) {
  const detail = document.getElementById('nodeDetail');
  if (!node) {
    detail.textContent = '没有节点详情。';
    return;
  }
  const texts = node.metadata?.cited_texts || [];
  detail.className = 'node-detail';
  detail.innerHTML = `<strong>${escapeHtml(node.label)}</strong><p class="muted small">${escapeHtml(node.type)} · ${node.count || 0} 条引用</p>${
    texts.length
      ? `<ol class="citation-list">${texts.map(text => `<li>${escapeHtml(text)}</li>`).join('')}</ol>`
      : '<p class="muted">该节点没有具体引用列表。</p>'
  }`;
}

function renderTerminalResultList(results) {
  document.getElementById('terminalResultList').innerHTML = results.length ? results.map(result => `
    <article class="terminal-item">
      <strong>${escapeHtml(terminalLabels[result.terminal_class] || result.terminal_class)}</strong>
      <p>${escapeHtml(result.cited_text)}</p>
      <p class="muted small">${escapeHtml(result.source_title || result.source_url || '未解析来源')} · ${escapeHtml(result.short_explanation || '')}${
        result.unresolved_reason ? ` · 原因：${escapeHtml(unresolvedReasonLabels[result.unresolved_reason] || result.unresolved_reason)}` : ''
      }</p>
    </article>
  `).join('') : '<p class="muted">没有带引用的陈述。</p>';
}

function renderAdvancedDebug(result) {
  document.getElementById('advancedDebug').innerHTML = `
    <dt>内部 claim 数</dt><dd>${(result.claims || []).length}</dd>
    <dt>旧版展示结果数</dt><dd>${(result.display_citations || []).length}</dd>
    <dt>旧版证据图数</dt><dd>${(result.evidence_graphs || []).length}</dd>
    <dt>来源数</dt><dd>${(result.sources || []).length}</dd>
    <dt>内部提示</dt><dd>claim_type、discourse_role、support_relation、final_bucket、risk_flags 等字段仍保留在 API 响应中，但默认界面不展示。</dd>
  `;
}

async function analyze() {
  const status = document.getElementById('status');
  const analyzeBtn = document.getElementById('analyzeBtn');
  const cancelBtn = document.getElementById('cancelBtn');
  if (currentJobId) return;
  status.textContent = '正在分析...';
  status.className = 'muted';
  analyzeBtn.disabled = true;
  cancelBtn.style.display = 'inline-block';
  try {
    const res = await fetch(`${API_BASE}/analyze/start`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        input_text: document.getElementById('text').value,
        original_question: document.getElementById('question').value || null,
        claim_extraction_mode: document.getElementById('extractor').value,
        enable_url_fetch: true,
        enable_web_search: document.getElementById('webSearch').checked,
        uncited_claim_analysis_enabled: false,
        max_upstream_depth: 2,
        max_terminal_trace_depth: 2
      })
    });
    if (!res.ok) {
      let message = await res.text();
      try {
        const errorData = JSON.parse(message);
        message = errorData.detail || message;
      } catch (_) {}
      throw new Error(message);
    }
    const job = await res.json();
    currentJobId = job.job_id;
    status.textContent = `${progressText(job)} 任务 ${currentJobId.slice(0, 8)}`;
    pollTimer = window.setInterval(pollJob, 1200);
    await pollJob();
  } catch (err) {
    status.textContent = String(err);
    status.className = 'error';
    resetJobControls();
  }
}
async function pollJob() {
  if (!currentJobId) return;
  const status = document.getElementById('status');
  try {
    const res = await fetch(`${API_BASE}/analyze/jobs/${currentJobId}`);
    if (!res.ok) throw new Error(await res.text());
    const job = await res.json();
    if (job.status === 'completed') {
      resetJobControls();
      const data = job.result;
      status.textContent = `完成。已分析 ${data.document_evidence_summary?.total_cited_statements || 0} 条带引用陈述。`;
      status.className = 'muted';
      render(data);
      return;
    }
    if (job.status === 'failed') {
      resetJobControls();
      status.textContent = progressText(job) || job.error || '分析失败。';
      status.className = 'error';
      return;
    }
    if (job.status === 'cancelled') {
      resetJobControls();
      status.textContent = '已取消。';
      status.className = 'muted';
      return;
    }
    status.textContent = `${progressText(job)} 任务 ${currentJobId.slice(0, 8)}`;
  } catch (err) {
    resetJobControls();
    status.textContent = String(err);
    status.className = 'error';
  }
}
async function cancelAnalyze() {
  if (!currentJobId) return;
  const status = document.getElementById('status');
  status.textContent = '正在取消...';
  try {
    await fetch(`${API_BASE}/analyze/jobs/${currentJobId}/cancel`, { method: 'POST' });
  } catch (err) {
    status.textContent = String(err);
    status.className = 'error';
  }
}
function resetJobControls() {
  if (pollTimer) window.clearInterval(pollTimer);
  pollTimer = null;
  currentJobId = null;
  document.getElementById('analyzeBtn').disabled = false;
  document.getElementById('cancelBtn').style.display = 'none';
}
document.getElementById('analyzeBtn').addEventListener('click', analyze);
document.getElementById('cancelBtn').addEventListener('click', cancelAnalyze);
document.getElementById('sampleBtn').addEventListener('click', () => {
  document.getElementById('text').value = `DKU 本科完成后会拿到 DKU 的中国学位和 Duke University 的学位，并成为两校校友。[1]\n\n某博客认为 DKU 更适合探索方向的人。[2]\n\n来源指针\n[1]: https://www.dukekunshan.edu.cn/about/the-liberal-arts-in-the-21st-century/ "Undergraduate Curriculum - DKU"\n[2]: https://example.com/blog "Example opinion blog"`;
});
</script>
</body>
</html>
